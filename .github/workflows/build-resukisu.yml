name: Build ReSukiSU

permissions:
  contents: write
  actions: write

on:
  workflow_call:
    inputs:
      android_version:
        type: string
        required: true
      kernel_version:
        type: string
        required: true
      sub_level:
        type: string
        required: true
      spoof_sublevel:
        type: string
        default: ""
      os_patch_level:
        type: string
        required: true
      add_susfs:
        type: boolean
        default: true
      add_resukisu:
        type: boolean
        default: true
      add_susfs_base:
        type: boolean
        default: true
      add_enhanced_susfs:
        type: boolean
        default: true
      add_ksu_safety:
        type: boolean
        default: true
      add_zeromount:
        type: boolean
        default: true
      add_zram:
        type: boolean
        default: true
      add_bbg:
        type: boolean
        default: false
      add_overlayfs_support:
        type: boolean
        default: true
      add_kpm:
        type: boolean
        default: false
      add_ptrace_fix:
        type: boolean
        default: true
      add_perf_patches:
        type: boolean
        default: true
      sukisu_commit:
        type: string
        default: ""
      susfs_commit:
        type: string
        default: ""
      device_codename:
        type: string
        default: ""
      stock_identity_codename:
        type: string
        default: ""
      kernel_commit:
        type: string
        default: ""
      artifact_name:
        type: string
        default: ""
      diagnostic_mode:
        type: boolean
        default: false
      build_pixel_boot:
        type: boolean
        default: false
      add_module_version_bypass:
        type: boolean
        default: true
      force_sus_mount:
        type: boolean
        default: false
      allow_sus_mount:
        type: boolean
        default: false
      susfs_enable_log:
        type: boolean
        default: true
      add_stealth_policy:
        type: boolean
        default: false

jobs:
  build:
    name: "ReSukiSU ${{ inputs.kernel_version }}.${{ inputs.sub_level }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      KSU_VARIANT: ReSukiSU
      KSU_DIR: KernelSU

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Free Disk Space
      uses: endersonmenezes/free-disk-space@v3
      with:
        remove_android: true
        remove_dotnet: true
        remove_haskell: true
        remove_tool_cache: true
        remove_swap: true
        remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
        remove_packages_one_command: true
        remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
        rm_cmd: "rmz"
        rmz_version: "3.1.1"
        testing: false

    - name: Install Build Tools
      run: sudo apt-get install -y -qq lld binutils lz4 zip

    - name: Download AnyKernel3 Artifact
      uses: actions/download-artifact@v8
      with:
        name: anykernel3
        path: AnyKernel3

    - name: Download Git Repo Tool Artifact
      uses: actions/download-artifact@v8
      with:
        name: git-repo-tool
        path: git-repo

    - name: Download Kernel Patches Artifact
      uses: actions/download-artifact@v8
      with:
        name: kernel-patches
        path: kernel_patches

    - name: Download SukiSU Patch
      if: inputs.add_zram
      uses: actions/download-artifact@v8
      with:
        name: sukisu-patch
        path: SukiSU_patch

    - name: Setup Build Environment
      env:
        ANDROID_VER: ${{ inputs.android_version }}
        KERNEL_VER: ${{ inputs.kernel_version }}
        SUB_LEVEL: ${{ inputs.sub_level }}
        OS_PATCH: ${{ inputs.os_patch_level }}
        INPUT_CODENAME: ${{ inputs.device_codename }}
        INPUT_KERNEL_COMMIT: ${{ inputs.kernel_commit }}
      run: |
        CONFIG="${ANDROID_VER}-${KERNEL_VER}-${SUB_LEVEL}"
        KERNEL_ROOT="$GITHUB_WORKSPACE/$CONFIG"
        VERSION_DIR="${ANDROID_VER}-${KERNEL_VER}"
        mkdir -p "$KERNEL_ROOT"
        PROFILE_FILE="$GITHUB_WORKSPACE/device-profiles.json"
        PROFILE_KERNEL_COMMIT=""
        if [ -n "$INPUT_CODENAME" ] && [ "$INPUT_CODENAME" != "generic" ] && [ -f "$PROFILE_FILE" ]; then
          PROFILE_KERNEL_COMMIT=$(jq -r ".devices.${INPUT_CODENAME}.kernel_commit // empty" "$PROFILE_FILE")
        fi
        KERNEL_COMMIT="${INPUT_KERNEL_COMMIT:-$PROFILE_KERNEL_COMMIT}"

        chmod +x "$GITHUB_WORKSPACE/git-repo/repo"
        echo "$GITHUB_WORKSPACE/git-repo" >> "$GITHUB_PATH"

        {
          echo "ANDROID_VER=$ANDROID_VER"
          echo "KERNEL_VER=$KERNEL_VER"
          echo "OS_PATCH=$OS_PATCH"
          echo "CONFIG=$CONFIG"
          echo "KERNEL_ROOT=$KERNEL_ROOT"
          echo "VERSION_DIR=$VERSION_DIR"
          echo "DEFCONFIG=$KERNEL_ROOT/common/arch/arm64/configs/gki_defconfig"
          echo "DEFCONFIG_FRAGMENT=$KERNEL_ROOT/common/arch/arm64/configs/sukisu_gki.fragment"
          echo "KERNEL_PATCHES=$GITHUB_WORKSPACE/kernel_patches"
          echo "ANYKERNEL3=$GITHUB_WORKSPACE/AnyKernel3"
          echo "KERNEL_COMMIT=$KERNEL_COMMIT"
        } >> "$GITHUB_ENV"

    - name: Validate Feature Dependencies
      env:
        ADD_RESUKISU: ${{ inputs.add_resukisu }}
        ADD_SUSFS_BASE: ${{ inputs.add_susfs && inputs.add_susfs_base }}
        ADD_ENHANCED_SUSFS: ${{ inputs.add_susfs && inputs.add_enhanced_susfs }}
        ADD_KSU_SAFETY: ${{ inputs.add_susfs && inputs.add_ksu_safety }}
        ADD_ZEROMOUNT: ${{ inputs.add_susfs && inputs.add_zeromount }}
      run: |
        [[ "$ADD_SUSFS_BASE" != "true" || "$ADD_RESUKISU" == "true" ]] || { echo "SUSFS requires ReSukiSU"; exit 1; }
        [[ "$ADD_ENHANCED_SUSFS" != "true" || "$ADD_SUSFS_BASE" == "true" ]] || { echo "Enhanced SUSFS requires base SUSFS"; exit 1; }
        [[ "$ADD_KSU_SAFETY" != "true" || "$ADD_SUSFS_BASE" == "true" ]] || { echo "KSU safety requires base SUSFS"; exit 1; }
        [[ "$ADD_ZEROMOUNT" != "true" || "$ADD_ENHANCED_SUSFS" == "true" ]] || { echo "ZeroMount requires enhanced SUSFS"; exit 1; }

    - name: Sync Kernel Source
      working-directory: ${{ env.KERNEL_ROOT }}
      env:
        ANDROID_VER: ${{ inputs.android_version }}
        KERNEL_VER: ${{ inputs.kernel_version }}
        OS_PATCH: ${{ inputs.os_patch_level }}
      run: |
        FORMATTED_BRANCH="${ANDROID_VER}-${KERNEL_VER}-${OS_PATCH}"

        repo init -u https://android.googlesource.com/kernel/manifest \
          -b "common-${FORMATTED_BRANCH}" --depth=1

        REMOTE_BRANCH=$(git ls-remote https://android.googlesource.com/kernel/common "${FORMATTED_BRANCH}")
        if grep -q deprecated <<< "$REMOTE_BRANCH"; then
          sed -i "s/\"${FORMATTED_BRANCH}\"/\"deprecated\/${FORMATTED_BRANCH}\"/g" .repo/manifests/default.xml
        fi

        repo --trace sync -c -j$(nproc --all) --fail-fast --no-tags --force-sync --no-clone-bundle
        if [ -n "$KERNEL_COMMIT" ]; then
          git -C common fetch https://android.googlesource.com/kernel/common "$KERNEL_COMMIT" --depth=1
          git -C common checkout --detach "$KERNEL_COMMIT"
          test "$(git -C common rev-parse HEAD)" = "$KERNEL_COMMIT"
        fi

    - name: Extract Sublevel
      env:
        INPUT_SUB_LEVEL: ${{ inputs.sub_level }}
        SPOOF_SUBLEVEL: ${{ inputs.spoof_sublevel }}
      run: |
        SUBLEVEL="$INPUT_SUB_LEVEL"
        if [[ -f "$KERNEL_ROOT/common/Makefile" ]]; then
          EXTRACTED=$(grep '^SUBLEVEL = ' "$KERNEL_ROOT/common/Makefile" | awk '{print $3}')
          [[ -n "$EXTRACTED" ]] && SUBLEVEL="$EXTRACTED"
        fi
        if [[ -n "$SPOOF_SUBLEVEL" ]]; then
          sed -i "s/^SUBLEVEL = .*/SUBLEVEL = ${SPOOF_SUBLEVEL}/" "$KERNEL_ROOT/common/Makefile"
          SUBLEVEL="$SPOOF_SUBLEVEL"
        fi

        ARTIFACT_BASE="${{ inputs.artifact_name }}"
        [ -n "$ARTIFACT_BASE" ] || ARTIFACT_BASE="${KERNEL_VER}.${SUBLEVEL}-${ANDROID_VER}-${OS_PATCH}-ReSukiSU"
        {
          echo "SUBLEVEL=$SUBLEVEL"
          echo "ARTIFACT_BASE=$ARTIFACT_BASE"
          echo "FILE_NAME=$ARTIFACT_BASE"
        } >> "$GITHUB_ENV"

    - name: Setup ReSukiSU
      if: inputs.add_resukisu
      working-directory: ${{ env.KERNEL_ROOT }}
      env:
        SUKISU_COMMIT: ${{ inputs.sukisu_commit }}
        INPUT_CODENAME: ${{ inputs.device_codename }}
      run: |
        PROFILE_PIN=""
        if [ -n "$INPUT_CODENAME" ] && [ "$INPUT_CODENAME" != "generic" ]; then
          PROFILE_PIN=$(jq -r ".devices.${INPUT_CODENAME}.resukisu_commit // empty" "$GITHUB_WORKSPACE/device-profiles.json")
        fi
        PIN="${SUKISU_COMMIT:-${PROFILE_PIN:-$(cat "$GITHUB_WORKSPACE/$VERSION_DIR/resukisu-pin.txt" 2>/dev/null || true)}}"
        [ -n "$PIN" ] || { echo "FATAL: ReSukiSU pin is empty"; exit 1; }
        curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/${PIN}/kernel/setup.sh" -o /tmp/resukisu-setup.sh
        bash /tmp/resukisu-setup.sh "$PIN"
        [ -d "$KERNEL_ROOT/$KSU_DIR" ] || { echo "FATAL: $KSU_DIR not created by setup.sh"; exit 1; }
        test "$(git -C "$KERNEL_ROOT/$KSU_DIR" rev-parse HEAD)" = "$(git -C "$KERNEL_ROOT/$KSU_DIR" rev-parse "$PIN")"
        echo "Pinned ReSukiSU to $(git -C "$KERNEL_ROOT/$KSU_DIR" rev-parse --short=7 HEAD)"

        cd "$KERNEL_ROOT/common"

        SUPERCALLS="drivers/kernelsu/supercalls.c"
        if [ -f "$SUPERCALLS" ]; then
          sed -i '/ksu_mark_running_process/d' "$SUPERCALLS"
          if grep -q "vzalloc" "$SUPERCALLS" && ! head -5 "$SUPERCALLS" | grep -q "vmalloc.h"; then
            sed -i '1a #include <linux/vmalloc.h>' "$SUPERCALLS"
          fi
        fi

    - name: Fix Old Kernel Compatibility
      if: inputs.add_resukisu
      working-directory: ${{ env.KERNEL_ROOT }}/common
      run: |
        FIX_SCRIPT="$GITHUB_WORKSPACE/$VERSION_DIR/build-helpers/fix-old-kernel-compat.sh"
        [ -f "$FIX_SCRIPT" ] && bash "$FIX_SCRIPT" "$KERNEL_ROOT/common" "$SUBLEVEL" || true

    - name: Apply Upstream SUSFS Patch
      if: inputs.add_susfs && inputs.add_susfs_base
      working-directory: ${{ env.KERNEL_ROOT }}/common
      env:
        SUSFS_COMMIT: ${{ inputs.susfs_commit }}
      run: |
        if ! grep -q '^#include <linux/susfs_def.h>$' fs/exec.c; then
          perl -0pi -e 's|#include <linux/coredump.h>\n\n|#include <linux/coredump.h>\n\n#ifdef CONFIG_KSU_SUSFS\n#include <linux/susfs_def.h>\n#endif\n|s' fs/exec.c
        fi
        if ! grep -q '^#include <linux/susfs_def.h>$' fs/proc/base.c; then
          perl -0pi -e 's|#include <linux/cpufreq_times.h>\n|#include <linux/cpufreq_times.h>\n#ifdef CONFIG_KSU_SUSFS_SUS_MAP\n#include <linux/susfs_def.h>\n#endif\n\n|s' fs/proc/base.c
        fi
        SUSFS_PATCH="$GITHUB_WORKSPACE/$VERSION_DIR/ReSukiSU/patches/50_add_susfs_in_gki-${ANDROID_VER}-${KERNEL_VER}.patch"
        if [ -n "$SUSFS_COMMIT" ]; then
          SUSFS_WORK="$RUNNER_TEMP/susfs4ksu-${SUSFS_COMMIT}"
          SUSFS_ZIP="$RUNNER_TEMP/susfs4ksu-${SUSFS_COMMIT}.zip"
          curl -fL "https://gitlab.com/simonpunk/susfs4ksu/-/archive/${SUSFS_COMMIT}/susfs4ksu-${SUSFS_COMMIT}.zip" -o "$SUSFS_ZIP"
          python3 - "$SUSFS_ZIP" "$SUSFS_WORK" <<'PY'
        import sys, zipfile
        zip_path, out_dir = sys.argv[1:]
        with zipfile.ZipFile(zip_path) as z:
            z.extractall(out_dir)
        PY
          SUSFS_PATCH="$(find "$SUSFS_WORK" -path "*/kernel_patches/50_add_susfs_in_gki-${ANDROID_VER}-${KERNEL_VER}.patch" -type f | head -1)"
          [ -s "$SUSFS_PATCH" ] || { echo "FATAL: SUSFS patch not found for ${ANDROID_VER}-${KERNEL_VER} at ${SUSFS_COMMIT}"; exit 1; }
          echo "Using upstream SUSFS commit ${SUSFS_COMMIT}"
          SUSFS_ROOT="$(dirname "$SUSFS_PATCH")"
          cp -f "$SUSFS_ROOT/fs/susfs.c" fs/susfs.c
          mkdir -p include/linux
          cp -f "$SUSFS_ROOT/include/linux/susfs.h" include/linux/susfs.h
          cp -f "$SUSFS_ROOT/include/linux/susfs_def.h" include/linux/susfs_def.h
        fi
        set +e
        patch -p1 --fuzz=0 --no-backup-if-mismatch < "$SUSFS_PATCH"
        PATCH_RC=$?
        set -e

        FIX="$GITHUB_WORKSPACE/$VERSION_DIR/build-helpers/fix-susfs-compat.sh"
        [ -f "$FIX" ] && bash "$FIX" . "$SUBLEVEL" "$ANDROID_VER" "$KERNEL_VER" "$KERNEL_PATCHES" || true
        if find . -type f -name '*.rej' | grep -q .; then
          echo "SUSFS patch still has rejects after compatibility fixes"
          exit "${PATCH_RC:-1}"
        fi

    - name: Apply Enhanced SUSFS Patch
      if: inputs.add_susfs && inputs.add_enhanced_susfs
      working-directory: ${{ env.KERNEL_ROOT }}/common
      run: |
        patch -p1 --fuzz=0 --no-backup-if-mismatch < "$GITHUB_WORKSPACE/$VERSION_DIR/ReSukiSU/patches/51_enhanced_susfs-${ANDROID_VER}-${KERNEL_VER}.patch"

    - name: Apply KSU Safety Patch
      if: inputs.add_susfs && inputs.add_ksu_safety
      working-directory: ${{ env.KERNEL_ROOT }}/${{ env.KSU_DIR }}
      run: |
        PATCH="$GITHUB_WORKSPACE/$VERSION_DIR/ReSukiSU/patches/70_ksu_safety-resukisu-${KERNEL_VER}.patch"
        if [ -s "$PATCH" ]; then
          patch -p1 --fuzz=0 --no-backup-if-mismatch < "$PATCH"
        else
          echo "No 70_ patch needed"
        fi

    - name: Apply ZeroMount Patch
      if: inputs.add_susfs && inputs.add_zeromount
      working-directory: ${{ env.KERNEL_ROOT }}/common
      run: |
        patch -p1 --fuzz=0 --no-backup-if-mismatch < "$GITHUB_WORKSPACE/$VERSION_DIR/ReSukiSU/patches/60_zeromount-${ANDROID_VER}-${KERNEL_VER}.patch"

    - name: Fix SUSFS Compatibility
      if: inputs.add_susfs && inputs.add_susfs_base
      working-directory: ${{ env.KERNEL_ROOT }}/common
      run: |
        FIX="$GITHUB_WORKSPACE/$VERSION_DIR/build-helpers/fix-susfs-compat.sh"
        [ -f "$FIX" ] && bash "$FIX" . "$SUBLEVEL" "$ANDROID_VER" "$KERNEL_VER" "$KERNEL_PATCHES" || true

    - name: Adapt ReSukiSU Latest Inline Hooks
      if: inputs.add_resukisu && inputs.add_susfs && inputs.add_susfs_base
      working-directory: ${{ env.KERNEL_ROOT }}/common
      run: |
        python3 - <<'PY'
        from pathlib import Path

        rewrites = {
            "drivers/input/input.c": [
                ("extern bool ksu_input_hook __read_mostly;\n", ""),
                ("\tif (unlikely(ksu_input_hook))\n\t\tksu_handle_input_handle_event(&type, &code, &value);",
                 "\tksu_handle_input_handle_event(&type, &code, &value);"),
            ],
            "fs/exec.c": [
                ("extern bool ksu_execveat_hook __read_mostly;\n", ""),
                ("if (unlikely(ksu_execveat_hook || !susfs_is_sdcard_android_data_decrypted)) {",
                 "if (unlikely(!susfs_is_sdcard_android_data_decrypted)) {"),
            ],
            "fs/read_write.c": [
                ("extern bool ksu_init_rc_hook __read_mostly;\n", ""),
                ("extern __attribute__((cold)) void ksu_handle_sys_read(unsigned int fd);\n",
                 "extern __attribute__((cold)) int ksu_handle_sys_read(unsigned int fd,\n\t\t\t\tchar __user **buf_ptr, size_t *count_ptr);\n"),
                ("#ifdef CONFIG_KSU_SUSFS\n\tif (unlikely(ksu_init_rc_hook))\n\t\tksu_handle_sys_read(fd);\n#endif\n\n\treturn ksys_read(fd, buf, count);",
                 "#ifdef CONFIG_KSU_SUSFS\n\tksu_handle_sys_read(fd, &buf, &count);\n#endif\n\n\treturn ksys_read(fd, buf, count);"),
                ("\t\tksu_handle_sys_read(fd);",
                 "\t\tksu_handle_sys_read(fd, &buf, &count);"),
            ],
            "fs/stat.c": [
                ("extern bool ksu_init_rc_hook __read_mostly;\n", ""),
                ("#ifdef CONFIG_KSU_SUSFS\n\tif (unlikely(ksu_init_rc_hook)) {\n\t\tksu_handle_vfs_fstat(fd, &stat->size);\n\t}\n#endif // #ifdef CONFIG_KSU_SUSFS",
                 "#ifdef CONFIG_KSU_SUSFS\n\tksu_handle_vfs_fstat(fd, &stat->size);\n#endif // #ifdef CONFIG_KSU_SUSFS"),
            ],
        }

        for file_name, replacements in rewrites.items():
            path = Path(file_name)
            if not path.exists():
                continue
            text = path.read_text()
            original = text
            for old, new in replacements:
                text = text.replace(old, new)
            if text != original:
                path.write_text(text)
                print(f"adapted {file_name}")

        forbidden = {
            "drivers/input/input.c": ["ksu_input_hook"],
            "fs/exec.c": ["ksu_execveat_hook"],
            "fs/read_write.c": ["ksu_init_rc_hook"],
            "fs/stat.c": ["ksu_init_rc_hook"],
        }
        for file_name, needles in forbidden.items():
            path = Path(file_name)
            if not path.exists():
                continue
            text = path.read_text()
            for needle in needles:
                if needle in text:
                    raise SystemExit(f"forbidden latest ReSukiSU inline hook token remains: {needle} in {file_name}")

        susfs = Path("fs/susfs.c")
        if susfs.exists():
            text = susfs.read_text()
            if "susfs_extra_works" not in text:
                marker = "#endif // #ifdef CONFIG_KSU_SUSFS_SUS_PATH\n"
                compat = (
                    "#ifdef CONFIG_KSU_SUSFS_SUS_PATH\n"
                    "static void susfs_extra_work_fn(struct work_struct *work)\n"
                    "{\n"
                    "\tsusfs_run_sus_path_loop(current_uid().val);\n"
                    "}\n"
                    "#else\n"
                    "static void susfs_extra_work_fn(struct work_struct *work) { }\n"
                    "#endif\n"
                    "DECLARE_WORK(susfs_extra_works, susfs_extra_work_fn);\n\n"
                )
                if marker not in text:
                    raise SystemExit("could not find SUS_PATH section end in fs/susfs.c")
                text = text.replace(marker, marker + compat, 1)
                susfs.write_text(text)
                print("defined susfs_extra_works")
        PY

    - name: Apply Kernel Patches
      if: inputs.add_ptrace_fix || inputs.add_perf_patches
      working-directory: ${{ env.KERNEL_ROOT }}/common
      env:
        ADD_PTRACE: ${{ inputs.add_ptrace_fix }}
        ADD_PERF: ${{ inputs.add_perf_patches }}
      run: |
        bash "$GITHUB_WORKSPACE/android12-5.10/build-helpers/apply-kernel-patches.sh" . "$KERNEL_VER" "$KERNEL_PATCHES"

    - name: Setup Baseband Guard
      if: inputs.add_bbg
      working-directory: ${{ env.KERNEL_ROOT }}
      run: |
        HELPERS="$GITHUB_WORKSPACE/$VERSION_DIR/build-helpers"
        bash "$HELPERS/setup-bbg.sh" . "$DEFCONFIG" "$DEFCONFIG_FRAGMENT"

    - name: Upgrade LZ4 to v1.10.0
      if: inputs.add_zram
      working-directory: ${{ env.KERNEL_ROOT }}/common
      env:
        KERNEL_VER: ${{ inputs.kernel_version }}
      run: |
        ZRAM_DIR="$GITHUB_WORKSPACE/zram"
        if [ -d "$ZRAM_DIR" ]; then
          rm -f lib/lz4/lz4_compress.c lib/lz4/lz4_decompress.c lib/lz4/lz4defs.h lib/lz4/lz4hc_compress.c
          cp -r "$ZRAM_DIR/lz4/"* ./lib/lz4/ 2>/dev/null || true
          cp -r "$ZRAM_DIR/include/linux/"* ./include/linux/ 2>/dev/null || true
          if [ -f "$ZRAM_DIR/$KERNEL_VER/lz4_1.10.0.patch" ]; then
            patch -p1 --fuzz=0 --no-backup-if-mismatch < "$ZRAM_DIR/$KERNEL_VER/lz4_1.10.0.patch"
          fi
        fi

    - name: Add LZ4K/LZ4KD Compression
      if: inputs.add_zram
      working-directory: ${{ env.KERNEL_ROOT }}/common
      run: |
        SUKISU="$GITHUB_WORKSPACE/SukiSU_patch"
        cp -r "$SUKISU/other/zram/lz4k/include/linux/"* ./include/linux/
        cp -r "$SUKISU/other/zram/lz4k/lib/"* ./lib/
        cp -r "$SUKISU/other/zram/lz4k/crypto/"* ./crypto/
        cp -r "$SUKISU/other/zram/lz4k_oplus" ./lib/
        if [ -f "$SUKISU/other/zram/zram_patch/$KERNEL_VER/lz4kd.patch" ]; then
          patch -p1 --fuzz=0 --no-backup-if-mismatch < "$SUKISU/other/zram/zram_patch/$KERNEL_VER/lz4kd.patch"
        fi
        if [ -f "$SUKISU/other/zram/zram_patch/$KERNEL_VER/lz4k_oplus.patch" ]; then
          patch -p1 --fuzz=0 --no-backup-if-mismatch < "$SUKISU/other/zram/zram_patch/$KERNEL_VER/lz4k_oplus.patch"
        fi

    - name: Configure Kernel
      working-directory: ${{ env.KERNEL_ROOT }}
      env:
        ADD_RESUKISU: ${{ inputs.add_resukisu }}
        ADD_SUSFS: ${{ inputs.add_susfs && inputs.add_susfs_base }}
        ADD_OVERLAYFS: ${{ inputs.add_overlayfs_support }}
        ADD_ZRAM: ${{ inputs.add_zram }}
        ADD_KPM: ${{ inputs.add_kpm }}
        DIAGNOSTIC_MODE: ${{ inputs.diagnostic_mode }}
        FORCE_SUS_MOUNT: ${{ inputs.force_sus_mount }}
        SUSFS_ENABLE_LOG: ${{ inputs.susfs_enable_log }}
      run: |
        FRAGMENT="$GITHUB_WORKSPACE/$VERSION_DIR/defconfig.fragment"
        HELPERS="$GITHUB_WORKSPACE/$VERSION_DIR/build-helpers"

        if [[ "$DIAGNOSTIC_MODE" == "true" ]]; then
          SOURCE_FRAGMENT="$RUNNER_TEMP/diagnostic.fragment"
          printf '# [base]\n' > "$SOURCE_FRAGMENT"
          [[ "$ADD_RESUKISU" == "true" ]] && echo 'CONFIG_KSU=y' >> "$SOURCE_FRAGMENT"
          [[ "$ADD_RESUKISU" == "true" ]] && echo 'CONFIG_KSU_MULTI_MANAGER_SUPPORT=y' >> "$SOURCE_FRAGMENT"
          [[ "$ADD_RESUKISU" == "true" ]] && echo 'CONFIG_KSU_TOOLKIT_SUPPORT=y' >> "$SOURCE_FRAGMENT"
          [[ "$ADD_KPM" == "true" ]] && echo 'CONFIG_KALLSYMS=y' >> "$SOURCE_FRAGMENT"
          [[ "$ADD_KPM" == "true" ]] && echo 'CONFIG_KALLSYMS_ALL=y' >> "$SOURCE_FRAGMENT"
          printf '\n# [susfs]\n' >> "$SOURCE_FRAGMENT"
          awk '/^# \[susfs\]/{found=1; next} /^# \[/{found=0} found && NF' "$FRAGMENT" >> "$SOURCE_FRAGMENT"
          FRAGMENT="$SOURCE_FRAGMENT"
        fi

        if [[ "$FORCE_SUS_MOUNT" == "true" || "$SUSFS_ENABLE_LOG" != "true" ]]; then
          OVERRIDE_FRAGMENT="$RUNNER_TEMP/config.override.fragment"
          cp "$FRAGMENT" "$OVERRIDE_FRAGMENT"
          if [[ "$FORCE_SUS_MOUNT" == "true" ]]; then
            sed -i '/^CONFIG_KSU_SUSFS_SUS_MOUNT=/d' "$OVERRIDE_FRAGMENT"
            printf '\nCONFIG_KSU_SUSFS_SUS_MOUNT=y\n' >> "$OVERRIDE_FRAGMENT"
          fi
          if [[ "$SUSFS_ENABLE_LOG" != "true" ]]; then
            sed -i '/^CONFIG_KSU_SUSFS_ENABLE_LOG=/d' "$OVERRIDE_FRAGMENT"
            printf '\nCONFIG_KSU_SUSFS_ENABLE_LOG=n\n' >> "$OVERRIDE_FRAGMENT"
          fi
          FRAGMENT="$OVERRIDE_FRAGMENT"
        fi

        ASSEMBLE_FLAGS=""
        [[ "$ADD_SUSFS" == "true" ]] && ASSEMBLE_FLAGS="$ASSEMBLE_FLAGS --susfs"
        [[ "$ADD_OVERLAYFS" == "true" ]] && ASSEMBLE_FLAGS="$ASSEMBLE_FLAGS --overlayfs"
        [[ "$ADD_ZRAM" == "true" ]] && ASSEMBLE_FLAGS="$ASSEMBLE_FLAGS --zram"
        [[ "$ADD_KPM" == "true" ]] && ASSEMBLE_FLAGS="$ASSEMBLE_FLAGS --kpm"
        [ ! -f "$KERNEL_ROOT/build/build.sh" ] && ASSEMBLE_FLAGS="$ASSEMBLE_FLAGS --kleaf"

        bash "$HELPERS/assemble-defconfig.sh" "$FRAGMENT" "$DEFCONFIG_FRAGMENT" "$DEFCONFIG" $ASSEMBLE_FLAGS

        while IFS='=' read -r cfg _; do
          symbol="${cfg#CONFIG_}"
          grep -Rqx "config ${symbol}" common/ ${KSU_DIR:+$KSU_DIR/} --include='Kconfig*' 2>/dev/null && continue
          sed -i "/^${cfg}=/d" "$DEFCONFIG_FRAGMENT" "$DEFCONFIG"
        done < <(grep '^CONFIG_KSU_' "$DEFCONFIG_FRAGMENT" 2>/dev/null || true)

        if ! grep -q '^CONFIG_KSU_SUSFS=' "$DEFCONFIG_FRAGMENT" 2>/dev/null; then
          sed -i '/^CONFIG_KSU_SUSFS_/d' "$DEFCONFIG_FRAGMENT" "$DEFCONFIG"
        fi

        bash "$HELPERS/bypass-abi-check.sh" . "$ANDROID_VER" "$KERNEL_VER"

    - name: Clean Module Lists
      if: inputs.add_zram
      working-directory: ${{ env.KERNEL_ROOT }}
      run: |
        HELPERS="$GITHUB_WORKSPACE/$VERSION_DIR/build-helpers"
        bash "$HELPERS/clean-module-list.sh" .

    - name: Apply Module Check Bypass
      if: inputs.add_module_version_bypass
      working-directory: ${{ env.KERNEL_ROOT }}
      env:
        KERNEL_VER: ${{ inputs.kernel_version }}
      run: |
        if [[ "$KERNEL_VER" == "6.1" || "$KERNEL_VER" == "6.6" || "$KERNEL_VER" == "6.12" ]]; then
          TARGET_FILE="$KERNEL_ROOT/common/kernel/module/version.c"
        else
          TARGET_FILE="$KERNEL_ROOT/common/kernel/module.c"
        fi
        sed -i '/bad_version:/{:a;n;/return 0;/{s/return 0;/return 1;/;b};ba}' "$TARGET_FILE"

    - name: Clean Build Flags
      working-directory: ${{ env.KERNEL_ROOT }}
      run: |
        HELPERS="$GITHUB_WORKSPACE/$VERSION_DIR/build-helpers"
        bash "$HELPERS/clean-build-flags.sh" . "$KERNEL_VER" "ReSukiSU"

    - name: Set Stock Build Identity
      working-directory: ${{ env.KERNEL_ROOT }}/common
      env:
        INPUT_CODENAME: ${{ inputs.device_codename }}
        STOCK_IDENTITY_CODENAME: ${{ inputs.stock_identity_codename }}
        KERNEL_VER: ${{ inputs.kernel_version }}
      run: |
        PROFILE_FILE="$GITHUB_WORKSPACE/device-profiles.json"

        if [ ! -f "$PROFILE_FILE" ] || ! command -v jq &>/dev/null; then
          echo "IDENTITY_STATUS=Generic" >> "$GITHUB_ENV"
          exit 0
        fi

        if [ -n "$STOCK_IDENTITY_CODENAME" ] && [ "$STOCK_IDENTITY_CODENAME" != "generic" ]; then
          DEVICE_CODENAME="$STOCK_IDENTITY_CODENAME"
        elif [ -n "$INPUT_CODENAME" ] && [ "$INPUT_CODENAME" != "generic" ]; then
          PROFILE_SL=$(jq -r ".devices.${INPUT_CODENAME}.sub_level // empty" "$PROFILE_FILE")
          if [ "$PROFILE_SL" = "$SUBLEVEL" ]; then
            DEVICE_CODENAME="$INPUT_CODENAME"
          fi
        fi

        if [ -z "$DEVICE_CODENAME" ]; then
          DEVICE_CODENAME=$(jq -r --arg kv "$KERNEL_VER" --arg sl "$SUBLEVEL" \
            '[.devices | to_entries[] | select(.key | startswith("_") | not) | select(.value.kernel_version == $kv and .value.sub_level == $sl) | .key] | first // empty' \
            "$PROFILE_FILE")
        fi

        if [ -z "$DEVICE_CODENAME" ]; then
          echo "IDENTITY_STATUS=Generic" >> "$GITHUB_ENV"
          exit 0
        fi

        STOCK_RELEASE=$(jq -r ".devices.${DEVICE_CODENAME}.stock_kernel.release" "$PROFILE_FILE")
        STOCK_VERSION=$(jq -r ".devices.${DEVICE_CODENAME}.stock_kernel.version_string" "$PROFILE_FILE")
        STOCK_BUILD_USER=$(jq -r ".devices.${DEVICE_CODENAME}.stock_kernel.build_user" "$PROFILE_FILE")
        STOCK_BUILD_HOST=$(jq -r ".devices.${DEVICE_CODENAME}.stock_kernel.build_host" "$PROFILE_FILE")
        STOCK_COMPILER=$(jq -r ".devices.${DEVICE_CODENAME}.stock_kernel.compiler_info // empty" "$PROFILE_FILE")
        STOCK_BUILD_TIMESTAMP=$(jq -r ".devices.${DEVICE_CODENAME}.stock_kernel.build_timestamp // empty" "$PROFILE_FILE")

        # 5.10-6.1: Makefile prepends KERNELVERSION, setlocalversion outputs suffix only
        # 6.6+: Makefile delegates entirely to setlocalversion, must output full version
        MAJOR=${KERNEL_VER%%.*}
        MINOR=${KERNEL_VER#*.}
        if [ "$MAJOR" -gt 6 ] || { [ "$MAJOR" -eq 6 ] && [ "$MINOR" -ge 6 ]; }; then
          RELEASE_OUTPUT="${KERNEL_VER}.${SUBLEVEL}${STOCK_RELEASE}"
        else
          RELEASE_OUTPUT="$STOCK_RELEASE"
        fi

        cat > scripts/setlocalversion << 'SETLOCAL_EOF'
        #!/bin/sh
        printf '%s' "RELEASE_OUTPUT_PLACEHOLDER"
        SETLOCAL_EOF
        sed -i "s|RELEASE_OUTPUT_PLACEHOLDER|${RELEASE_OUTPUT}|g" scripts/setlocalversion
        chmod +x scripts/setlocalversion

        if [ -f "scripts/mkcompile_h" ]; then
          sed -i "s|UTS_VERSION=.*|UTS_VERSION=\"${STOCK_VERSION}\"|" scripts/mkcompile_h
          if grep -q "LINUX_COMPILE_BY=" scripts/mkcompile_h; then
            sed -i "s|LINUX_COMPILE_BY=.*|LINUX_COMPILE_BY=\"${STOCK_BUILD_USER}\"|" scripts/mkcompile_h
            sed -i "s|LINUX_COMPILE_HOST=.*|LINUX_COMPILE_HOST=\"${STOCK_BUILD_HOST}\"|" scripts/mkcompile_h
          fi
          if [ -n "$STOCK_COMPILER" ] && grep -q "LINUX_COMPILER=" scripts/mkcompile_h; then
            sed -i "s|LINUX_COMPILER=.*|LINUX_COMPILER=\"${STOCK_COMPILER}\"|" scripts/mkcompile_h
          fi
        fi

        if [ -n "$STOCK_BUILD_TIMESTAMP" ]; then
          echo "KBUILD_BUILD_TIMESTAMP=$STOCK_BUILD_TIMESTAMP" >> "$GITHUB_ENV"
          SOURCE_DATE_EPOCH=$(date -u -d "$STOCK_BUILD_TIMESTAMP" +%s 2>/dev/null || echo 1737466783)
          echo "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH" >> "$GITHUB_ENV"
        fi
        {
          echo "KBUILD_BUILD_USER=$STOCK_BUILD_USER"
          echo "KBUILD_BUILD_HOST=$STOCK_BUILD_HOST"
          echo "IDENTITY_STATUS=Applied ($DEVICE_CODENAME)"
        } >> "$GITHUB_ENV"

    - name: Build Kernel
      working-directory: ${{ env.KERNEL_ROOT }}
      run: |
        BUILD_RC=0
        LTO_MODE=thin
        [[ "$ANDROID_VER" == android16* || "$KERNEL_VER" == "6.12" ]] && LTO_MODE=none
        BAZEL_ENV_ARGS=""
        if [ -n "${KBUILD_BUILD_TIMESTAMP:-}" ]; then
          BAZEL_ENV_ARGS+=" --action_env=KBUILD_BUILD_TIMESTAMP=${KBUILD_BUILD_TIMESTAMP}"
        fi
        if [ -n "${KBUILD_BUILD_USER:-}" ]; then
          BAZEL_ENV_ARGS+=" --action_env=KBUILD_BUILD_USER=${KBUILD_BUILD_USER}"
        fi
        if [ -n "${KBUILD_BUILD_HOST:-}" ]; then
          BAZEL_ENV_ARGS+=" --action_env=KBUILD_BUILD_HOST=${KBUILD_BUILD_HOST}"
        fi
        if [ -f "build/build.sh" ]; then
          KMI_SYMBOL_LIST_STRICT_MODE=0 HOSTLD=/usr/bin/ld.lld GKI_DEFCONFIG_FRAGMENT="$DEFCONFIG_FRAGMENT" LTO=$LTO_MODE BAZEL_ARGS="${BAZEL_ARGS:-}${BAZEL_ENV_ARGS}" KBUILD_BUILD_TIMESTAMP="${KBUILD_BUILD_TIMESTAMP:-}" SOURCE_DATE_EPOCH="${SOURCE_DATE_EPOCH:-}" BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh || BUILD_RC=$?
        else
          # Prebuilt clang sysroot lacks glibc 2.39 C23 symbols - link against system libc
          if [ -f common/tools/bpf/resolve_btfids/Makefile ]; then
            echo 'override KBUILD_HOSTLDFLAGS += --sysroot=/' >> common/tools/bpf/resolve_btfids/Makefile
            echo 'override LDFLAGS += --sysroot=/' >> common/tools/bpf/resolve_btfids/Makefile
          fi
          tools/bazel build --config=fast --lto=$LTO_MODE --defconfig_fragment=//common:arch/arm64/configs/sukisu_gki.fragment //common:kernel_aarch64_dist || BUILD_RC=$?
        fi
        if [ "$BUILD_RC" -ne 0 ]; then
          if find . -name "Image" -type f 2>/dev/null | grep -q .; then
            echo "::warning::Build exited $BUILD_RC but Image exists (likely depmod failure)"
          else
            exit "$BUILD_RC"
          fi
        fi

    - name: Dump Build Errors
      if: failure()
      run: |
        for LOG in $(find "$KERNEL_ROOT" -name '*.log' -newer "$KERNEL_ROOT/common" -type f 2>/dev/null | head -5); do
          echo "::group::$(basename "$LOG")"
          tail -80 "$LOG"
          echo "::endgroup::"
        done

    - name: Validate Diagnostic Kernel Config
      if: inputs.diagnostic_mode
      env:
        ADD_RESUKISU: ${{ inputs.add_resukisu }}
        ADD_SUSFS_BASE: ${{ inputs.add_susfs && inputs.add_susfs_base }}
        ADD_ZEROMOUNT: ${{ inputs.add_susfs && inputs.add_zeromount }}
        ALLOW_SUS_MOUNT: ${{ inputs.allow_sus_mount }}
      run: |
        CONFIG_FILE=$(find "$KERNEL_ROOT" -type f -name .config | head -1)
        [ -f "$CONFIG_FILE" ] || { echo "Final .config not found"; exit 1; }
        require_config() {
          local symbol="$1" expected="$2"
          if [[ "$expected" == "true" ]]; then
            grep -qx "${symbol}=y" "$CONFIG_FILE" || { echo "Expected ${symbol}=y"; exit 1; }
          else
            ! grep -qx "${symbol}=y" "$CONFIG_FILE" || { echo "Unexpected ${symbol}=y"; exit 1; }
          fi
        }
        require_config CONFIG_KSU "$ADD_RESUKISU"
        require_config CONFIG_KSU_SUSFS "$ADD_SUSFS_BASE"
        require_config CONFIG_ZEROMOUNT "$ADD_ZEROMOUNT"
        require_config CONFIG_KSU_SUSFS_SUS_MOUNT "$ALLOW_SUS_MOUNT"

    - name: Prepare AnyKernel3
      run: |
        if [ -f "$KERNEL_ROOT/out/${ANDROID_VER}-${KERNEL_VER}/dist/Image" ]; then
          cp "$KERNEL_ROOT/out/${ANDROID_VER}-${KERNEL_VER}/dist/Image" "$ANYKERNEL3/Image"
        elif [ -f "$KERNEL_ROOT/bazel-bin/common/kernel_aarch64/Image" ]; then
          cp "$KERNEL_ROOT/bazel-bin/common/kernel_aarch64/Image" "$ANYKERNEL3/Image"
        else
          echo "FATAL: Image not found"
          find "$KERNEL_ROOT" -name "Image" -type f 2>/dev/null
          exit 1
        fi

    - name: Build and Verify Pixel 6 boot.img
      if: inputs.build_pixel_boot
      run: |
        EXPECTED_RELEASE="${KERNEL_VER}.${SUBLEVEL}$(jq -r '.devices.oriole.stock_kernel.release' "$GITHUB_WORKSPACE/device-profiles.json")"
        HELPER="$GITHUB_WORKSPACE/$VERSION_DIR/build-helpers/pixel6-boot.py"
        python3 "$HELPER" build --image "$ANYKERNEL3/Image" --boot "$GITHUB_WORKSPACE/boot.img"
        python3 "$HELPER" verify --boot "$GITHUB_WORKSPACE/boot.img" --expected-release "$EXPECTED_RELEASE"

    - name: Scan Patch Rejects
      if: always()
      run: |
        REJECTS_DIR="$GITHUB_WORKSPACE/patch-rejects"
        mkdir -p "$REJECTS_DIR"
        mapfile -t REJS < <(find "$KERNEL_ROOT" -type f -name '*.rej')
        REJ_COUNT=${#REJS[@]}
        echo "REJ_COUNT=$REJ_COUNT" >> "$GITHUB_ENV"
        if [ "$REJ_COUNT" -gt 0 ]; then
          for REJ in "${REJS[@]}"; do
            REL="${REJ#"$KERNEL_ROOT"/}"
            DEST="$REJECTS_DIR/$REL"
            mkdir -p "$(dirname "$DEST")"
            cp "$REJ" "$DEST"
            ORIG="${REJ%.rej}"
            [ -f "$ORIG" ] && cp "$ORIG" "$REJECTS_DIR/${REL%.rej}"
          done
          [[ "${{ inputs.diagnostic_mode }}" != "true" ]] || { echo "Patch rejects are forbidden in diagnostic mode"; exit 1; }
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.FILE_NAME }}-AnyKernel3
        path: ./AnyKernel3/**
        if-no-files-found: error
        compression-level: 9

    - name: Upload Pixel 6 boot.img
      if: inputs.build_pixel_boot
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.FILE_NAME }}-boot
        path: ./boot.img
        if-no-files-found: error
        compression-level: 0

    - name: Package resukisu-stealth-policy
      if: inputs.add_stealth_policy
      run: |
        POLICY_DIR="$GITHUB_WORKSPACE/userspace/resukisu-stealth-policy"
        test -f "$POLICY_DIR/module.prop"
        rm -f "$GITHUB_WORKSPACE/resukisu-stealth-policy.zip"
        (cd "$POLICY_DIR" && zip -qr "$GITHUB_WORKSPACE/resukisu-stealth-policy.zip" .)

    - name: Upload resukisu-stealth-policy
      if: inputs.add_stealth_policy
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.FILE_NAME }}-resukisu-stealth-policy
        path: ./resukisu-stealth-policy.zip
        if-no-files-found: error
        compression-level: 0

    - name: Upload Rejects
      if: always() && env.REJ_COUNT > 0
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.FILE_NAME }}-Rejects
        path: patch-rejects/
        if-no-files-found: ignore
        compression-level: 9

    - name: Job Summary
      if: always()
      env:
        ADD_RESUKISU: ${{ inputs.add_resukisu }}
        ADD_SUSFS_BASE: ${{ inputs.add_susfs && inputs.add_susfs_base }}
        ADD_ENHANCED_SUSFS: ${{ inputs.add_susfs && inputs.add_enhanced_susfs }}
        ADD_KSU_SAFETY: ${{ inputs.add_susfs && inputs.add_ksu_safety }}
        ADD_ZEROMOUNT: ${{ inputs.add_susfs && inputs.add_zeromount }}
        ADD_ZRAM: ${{ inputs.add_zram }}
        ADD_BBG: ${{ inputs.add_bbg }}
        ADD_OVERLAYFS: ${{ inputs.add_overlayfs_support }}
        ADD_KPM: ${{ inputs.add_kpm }}
        FORCE_SUS_MOUNT: ${{ inputs.force_sus_mount }}
        SUSFS_ENABLE_LOG: ${{ inputs.susfs_enable_log }}
        ADD_STEALTH_POLICY: ${{ inputs.add_stealth_policy }}
      run: |
        S() { [[ "$1" == "true" ]] && echo "Enabled" || echo "Disabled"; }
        {
          echo "## ReSukiSU | ${KERNEL_VER}.${SUBLEVEL}"
          echo ""
          echo "| Feature | Status |"
          echo "|---------|--------|"
          echo "| **Kernel** | ${KERNEL_VER}.${SUBLEVEL} |"
          echo "| **Android** | ${ANDROID_VER} |"
          echo "| **OS Patch Level** | ${OS_PATCH} |"
          echo "| **ReSukiSU** | $(S "$ADD_RESUKISU") |"
          echo "| **Base SUSFS** | $(S "$ADD_SUSFS_BASE") |"
          echo "| **Enhanced SUSFS** | $(S "$ADD_ENHANCED_SUSFS") |"
          echo "| **KSU safety** | $(S "$ADD_KSU_SAFETY") |"
          echo "| **ZeroMount** | $(S "$ADD_ZEROMOUNT") |"
          echo "| **ZRAM (LZ4K/LZ4KD)** | $(S "$ADD_ZRAM") |"
          echo "| **LZ4 v1.10.0** | $(S "$ADD_ZRAM") |"
          echo "| **Overlayfs Support** | $(S "$ADD_OVERLAYFS") |"
          echo "| **Unicode Filter** | Enabled |"
          echo "| **Baseband Guard** | $(S "$ADD_BBG") |"
          echo "| **KPM** | $(S "$ADD_KPM") |"
          echo "| **SUS_MOUNT** | $(S "$FORCE_SUS_MOUNT") |"
          echo "| **SUSFS logs** | $(S "$SUSFS_ENABLE_LOG") |"
          echo "| **Stealth policy zip** | $(S "$ADD_STEALTH_POLICY") |"
          echo "| **Device Profile** | ${IDENTITY_STATUS:-Generic} |"
          echo "| **Rejects** | ${REJ_COUNT:-0} |"
          echo "| **Artifact** | ${FILE_NAME} |"
        } >> "$GITHUB_STEP_SUMMARY"
        REPORT="$GITHUB_WORKSPACE/$VERSION_DIR/build-helpers/report-config.sh"
        [ -f "$REPORT" ] && bash "$REPORT" "$KERNEL_ROOT" "$ANDROID_VER" "$KERNEL_VER" || true
