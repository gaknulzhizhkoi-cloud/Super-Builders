name: Pixel 6 ReSukiSU Stealth Stack

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/build-resukisu.yml"
      - ".github/workflows/pixel6-resukisu-stealth.yml"
      - "android14-6.1/**"
      - "device-profiles.json"
      - "userspace/resukisu-stealth-policy/**"

jobs:
  download-dependencies:
    uses: ./.github/workflows/cache-dependencies.yml
    permissions:
      contents: read
      actions: write

  build:
    needs: [download-dependencies]
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: A134-R0-resukisu-6.1.99
            add_susfs_base: false
            add_enhanced_susfs: false
            susfs_commit: ""
            add_kpm: false
            force_sus_mount: false
            allow_sus_mount: false
            susfs_enable_log: true
            add_stealth_policy: false
          - artifact_name: A134-S0-no-sus-mount-6.1.99
            add_susfs_base: true
            add_enhanced_susfs: false
            susfs_commit: 9bf72ec2c83d40f194b936cabbc64ce342e005bf
            add_kpm: false
            force_sus_mount: false
            allow_sus_mount: false
            susfs_enable_log: true
            add_stealth_policy: true
    uses: ./.github/workflows/build-resukisu.yml
    with:
      android_version: android14
      kernel_version: "6.1"
      sub_level: "134"
      spoof_sublevel: "99"
      os_patch_level: "2025-05"
      device_codename: oriole
      stock_identity_codename: oriole
      kernel_commit: 8dc7d7757edd922ed1e79851711dc2c47bfcf227
      sukisu_commit: 2c68261c56f8adf177ebb4c0369bb8b54e6f43b1
      susfs_commit: ${{ matrix.susfs_commit }}
      artifact_name: ${{ matrix.artifact_name }}
      diagnostic_mode: true
      build_pixel_boot: true
      add_resukisu: true
      add_susfs: true
      add_susfs_base: ${{ matrix.add_susfs_base }}
      add_enhanced_susfs: ${{ matrix.add_enhanced_susfs }}
      add_zeromount: false
      add_ksu_safety: false
      add_zram: false
      add_bbg: false
      add_overlayfs_support: false
      add_kpm: ${{ matrix.add_kpm }}
      add_ptrace_fix: false
      add_perf_patches: false
      add_module_version_bypass: false
      force_sus_mount: ${{ matrix.force_sus_mount }}
      allow_sus_mount: ${{ matrix.allow_sus_mount }}
      susfs_enable_log: ${{ matrix.susfs_enable_log }}
      add_stealth_policy: ${{ matrix.add_stealth_policy }}
